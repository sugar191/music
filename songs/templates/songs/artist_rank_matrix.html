{% extends "base.html" %}
{% block content %}
    <!-- ユーザー選択プルダウン -->
    <div class="top-bar">
        <select id="kind-select" onchange="switchTopKind(this)">
            <option value="{% url 'artist_rank_matrix' %}" selected>歌手</option>
            <option value="{% url 'lyricist_matrix' %}">作詞</option>
            <option value="{% url 'composer_matrix' %}">作曲</option>
            <option value="{% url 'year_matrix' %}">年</option>
        </select>
        <form method="get" action="{% url 'artist_rank_matrix' %}">
            <select name="user" id="user" onchange="this.form.submit()">
            {% for user in all_users %}
                <option value="{{ user.id }}" {% if user == selected_user %}selected{% endif %}>
                {{ user.username }}
                </option>
            {% endfor %}
            </select>

            <select name="region_id" id="region-select" onchange="this.form.submit()">
            <option value="" {% if not region_id %}selected{% endif %}>全て</option>
            {% for r in regions %}
                <option value="{{ r.id }}" {% if r.id|stringformat:"s" == region_id %}selected{% endif %}>
                {{ r.name }}
                </option>
            {% endfor %}
            </select>
        </form>
    </div>
    <script>
        function switchTopKind(sel) {
            const params = new URLSearchParams(window.location.search);
            const qs = params.toString();
            window.location.href = sel.value + (qs ? "?" + qs : "");
        }
    </script>

    <div class="table-area">
        <table id="rank-matrix-table">
        <thead>
            <tr>
            <th>歌手</th>
            <th style="text-align:right; cursor:pointer;" data-sort-n="5">5</th>
            <th style="text-align:right; cursor:pointer;" data-sort-n="10">10</th>
            <th style="text-align:right; cursor:pointer;" data-sort-n="15">15</th>
            <th style="text-align:right; cursor:pointer;" data-sort-n="20">20</th>
            </tr>
        </thead>
        <tbody>
            {% for r in rows %}
            <tr>
                <td><a href="{% url 'artist_songs' r.artist_id %}">{{ r.artist_name }}</a></td>
                <td style="text-align:right;">{{ r.rank_5|default:"-" }}</td>
                <td style="text-align:right;">{{ r.rank_10|default:"-" }}</td>
                <td style="text-align:right;">{{ r.rank_15|default:"-" }}</td>
                <td style="text-align:right;">{{ r.rank_20|default:"-" }}</td>
            </tr>
            {% endfor %}
        </tbody>
        </table>
    </div>

    <script>
    (function () {
        var table = document.getElementById('rank-matrix-table');
        if (!table) return;
        var tbody = table.tBodies[0];
        if (!tbody) return;

        // 列インデックス: 0=歌手, 1=5, 2=10, 3=15, 4=20
        var colIndexByN = { 5: 1, 10: 2, 15: 3, 20: 4 };
        // 各Nでのタイブレーカー順（クリックされたN値が「-」のときの並べ替え基準）
        var tieBreakersByN = {
            5:  [],
            10: [5],
            15: [10, 5],
            20: [15, 10, 5]
        };

        function parseCell(row, n) {
            var td = row.cells[colIndexByN[n]];
            if (!td) return null;
            var txt = (td.textContent || '').trim();
            if (txt === '' || txt === '-') return null;
            var v = parseInt(txt, 10);
            return isNaN(v) ? null : v;
        }

        function artistName(row) {
            var td = row.cells[0];
            return td ? (td.textContent || '').trim() : '';
        }

        function sortByN(n) {
            var rows = Array.prototype.slice.call(tbody.rows);
            var tbs = tieBreakersByN[n] || [];

            rows.sort(function (a, b) {
                var av = parseCell(a, n);
                var bv = parseCell(b, n);

                // 「-」を一番下へ
                var aNull = (av === null);
                var bNull = (bv === null);
                if (aNull && !bNull) return 1;
                if (!aNull && bNull) return -1;

                if (!aNull && !bNull) {
                    // どちらも値あり → クリックされた列で昇順
                    if (av !== bv) return av - bv;
                } else {
                    // 両方「-」 → タイブレーカーで比較
                    for (var i = 0; i < tbs.length; i++) {
                        var tn = tbs[i];
                        var at = parseCell(a, tn);
                        var bt = parseCell(b, tn);
                        var atNull = (at === null);
                        var btNull = (bt === null);
                        if (atNull && !btNull) return 1;
                        if (!atNull && btNull) return -1;
                        if (!atNull && !btNull && at !== bt) return at - bt;
                    }
                }
                // 最終タイブレーカー：歌手名（昇順）
                return artistName(a).localeCompare(artistName(b), 'ja');
            });

            var frag = document.createDocumentFragment();
            rows.forEach(function (r) { frag.appendChild(r); });
            tbody.appendChild(frag);
        }

        var headers = table.querySelectorAll('th[data-sort-n]');
        Array.prototype.forEach.call(headers, function (th) {
            th.addEventListener('click', function () {
                var n = parseInt(th.getAttribute('data-sort-n'), 10);
                sortByN(n);
            });
        });

        // 初期表示は「5でソート」と同じ並びにする
        sortByN(5);
    })();
    </script>

{% endblock %}
